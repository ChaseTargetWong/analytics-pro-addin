<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Analytics Pro Dashboard</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:       #0d1b2a;
      --navy-mid:   #1a2d42;
      --navy-light: #243b55;
      --cyan:       #00e5ff;
      --cyan-dim:   rgba(0,229,255,0.12);
      --gold:       #ffd166;
      --green:      #06d6a0;
      --red:        #ef476f;
      --text:       #e8edf2;
      --muted:      #7b91a8;
      --border:     rgba(0,229,255,0.15);
      --card:       rgba(26,45,66,0.8);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid background ── */
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events:none;
      z-index:0;
    }

    .pane { position:relative; z-index:1; padding:14px 14px 24px; }

    /* ── Header ── */
    .header {
      display:flex;
      align-items:center;
      gap:10px;
      padding-bottom:14px;
      border-bottom:1px solid var(--border);
      margin-bottom:16px;
      animation: fadeDown 0.4s ease both;
    }
    .logo {
      width:32px; height:32px;
      background: linear-gradient(135deg, var(--cyan), #0077b6);
      border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .header-text h1 {
      font-family:'Syne', sans-serif;
      font-size:15px; font-weight:800;
      color:var(--cyan);
      letter-spacing:0.03em;
    }
    .header-text p { color:var(--muted); font-size:10px; margin-top:1px; }
    .refresh-btn {
      margin-left:auto;
      background:var(--cyan-dim);
      border:1px solid var(--border);
      color:var(--cyan);
      border-radius:6px;
      padding:5px 10px;
      font-size:11px;
      font-family:'DM Sans', sans-serif;
      cursor:pointer;
      transition:all 0.2s;
      display:flex; align-items:center; gap:5px;
    }
    .refresh-btn:hover { background:rgba(0,229,255,0.2); }
    .refresh-btn.spinning svg { animation:spin 0.8s linear infinite; }

    /* ── Status bar ── */
    #statusBar {
      font-family:'DM Mono', monospace;
      font-size:10px;
      color:var(--muted);
      background:rgba(0,0,0,0.3);
      border:1px solid var(--border);
      border-radius:6px;
      padding:6px 10px;
      margin-bottom:14px;
      min-height:28px;
      display:flex; align-items:center; gap:6px;
      animation: fadeDown 0.4s 0.1s ease both;
    }
    #statusBar .dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--green); flex-shrink:0;
      box-shadow: 0 0 6px var(--green);
    }
    #statusBar.loading .dot { background:var(--gold); box-shadow:0 0 6px var(--gold); animation: pulse 1s infinite; }
    #statusBar.error   .dot { background:var(--red);  box-shadow:0 0 6px var(--red); }

    /* ── KPI Grid ── */
    .section-label {
      font-family:'DM Mono', monospace;
      font-size:9px;
      letter-spacing:0.12em;
      color:var(--muted);
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .kpi-grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:16px;
    }
    .kpi-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px 12px 10px;
      position:relative;
      overflow:hidden;
      opacity:0;
      animation: fadeUp 0.4s ease forwards;
      backdrop-filter: blur(8px);
    }
    .kpi-card::before {
      content:'';
      position:absolute;
      top:0; left:0; right:0;
      height:2px;
      background:linear-gradient(90deg, var(--glow-a), var(--glow-b));
    }
    .kpi-card:nth-child(1) { --glow-a:#00e5ff; --glow-b:#0077b6; animation-delay:0.15s; }
    .kpi-card:nth-child(2) { --glow-a:#ffd166; --glow-b:#ff9e00; animation-delay:0.22s; }
    .kpi-card:nth-child(3) { --glow-a:#06d6a0; --glow-b:#00b4d8; animation-delay:0.29s; }
    .kpi-card:nth-child(4) { --glow-a:#ef476f; --glow-b:#f72585; animation-delay:0.36s; }

    .kpi-label { font-size:9px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
    .kpi-value {
      font-family:'Syne', sans-serif;
      font-size:22px; font-weight:800;
      color:var(--text);
      line-height:1;
      margin-bottom:4px;
      transition: all 0.3s;
    }
    .kpi-meta { font-size:10px; display:flex; align-items:center; gap:4px; }
    .badge {
      font-family:'DM Mono', monospace;
      font-size:9px;
      padding:2px 5px;
      border-radius:4px;
      font-weight:500;
    }
    .badge.up   { background:rgba(6,214,160,0.15); color:var(--green); }
    .badge.down { background:rgba(239,71,111,0.15); color:var(--red); }
    .badge.neutral { background:rgba(255,209,102,0.15); color:var(--gold); }

    /* ── Sparkline Chart ── */
    .chart-section { margin-bottom:16px; animation: fadeUp 0.4s 0.4s ease both; opacity:0; }
    .chart-card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
      backdrop-filter:blur(8px);
    }
    .chart-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:10px;
    }
    .chart-title { font-family:'Syne', sans-serif; font-size:12px; font-weight:700; }
    .chart-tabs { display:flex; gap:4px; }
    .chart-tab {
      font-size:9px; padding:3px 7px; border-radius:4px;
      border:1px solid var(--border);
      background:transparent; color:var(--muted);
      cursor:pointer; transition:all 0.2s;
      font-family:'DM Sans', sans-serif;
    }
    .chart-tab.active { background:var(--cyan-dim); color:var(--cyan); border-color:var(--cyan); }
    canvas#sparkCanvas { width:100%; height:90px; display:block; }

    /* ── Table ── */
    .table-section { margin-bottom:16px; animation: fadeUp 0.4s 0.5s ease both; opacity:0; }
    .data-table { width:100%; border-collapse:collapse; }
    .data-table th {
      font-family:'DM Mono', monospace;
      font-size:8px; letter-spacing:0.1em;
      color:var(--muted); text-transform:uppercase;
      padding:5px 6px; text-align:left;
      border-bottom:1px solid var(--border);
    }
    .data-table td {
      padding:6px 6px;
      font-size:11px;
      border-bottom:1px solid rgba(0,229,255,0.05);
      vertical-align:middle;
    }
    .data-table tr:hover td { background:rgba(0,229,255,0.04); }
    .bar-cell { display:flex; align-items:center; gap:6px; }
    .mini-bar { height:4px; border-radius:2px; background:var(--cyan); min-width:2px; transition:width 0.6s ease; }

    /* ── Actions ── */
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; animation: fadeUp 0.4s 0.6s ease both; opacity:0; }
    .action-btn {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px 8px;
      color:var(--text);
      font-family:'DM Sans', sans-serif;
      font-size:11px;
      cursor:pointer;
      transition:all 0.2s;
      display:flex; flex-direction:column; align-items:center; gap:4px;
      text-align:center;
      backdrop-filter:blur(8px);
    }
    .action-btn:hover { border-color:var(--cyan); background:var(--cyan-dim); color:var(--cyan); transform:translateY(-1px); }
    .action-btn:active { transform:translateY(0); }
    .action-btn .icon { font-size:18px; }
    .action-btn span { font-size:10px; color:var(--muted); }

    /* ── Toast ── */
    #toast {
      position:fixed; bottom:16px; left:14px; right:14px;
      background:var(--navy-light);
      border:1px solid var(--cyan);
      border-radius:8px;
      padding:10px 12px;
      font-size:11px;
      font-family:'DM Mono', monospace;
      color:var(--cyan);
      transform:translateY(60px);
      opacity:0;
      transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index:100;
    }
    #toast.show { transform:translateY(0); opacity:1; }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform:rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Skeleton loader */
    .skeleton {
      background:linear-gradient(90deg, var(--navy-light) 25%, var(--navy-mid) 50%, var(--navy-light) 75%);
      background-size:200% 100%;
      animation:shimmer 1.2s infinite;
      border-radius:4px;
      color:transparent !important;
    }
    @keyframes shimmer { to { background-position:-200% 0; } }
  </style>
</head>
<body>
<div class="pane">

  <!-- Header -->
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>ANALYTICS PRO</h1>
      <p>Live workbook dashboard</p>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Status -->
  <div id="statusBar">
    <div class="dot"></div>
    <span id="statusText">Initialising Office JS…</span>
  </div>

  <!-- KPIs -->
  <div class="section-label">Key Metrics</div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-value" id="kpi-revenue">—</div>
      <div class="kpi-meta"><span class="badge up" id="kpi-revenue-badge">—</span> vs last period</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Units Sold</div>
      <div class="kpi-value" id="kpi-units">—</div>
      <div class="kpi-meta"><span class="badge neutral" id="kpi-units-badge">—</span> YTD</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Gross Margin</div>
      <div class="kpi-value" id="kpi-margin">—</div>
      <div class="kpi-meta"><span class="badge up" id="kpi-margin-badge">—</span> avg</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Customers</div>
      <div class="kpi-value" id="kpi-customers">—</div>
      <div class="kpi-meta"><span class="badge up" id="kpi-customers-badge">—</span> new</div>
    </div>
  </div>

  <!-- Sparkline Chart -->
  <div class="chart-section">
    <div class="section-label">Revenue Trend</div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Monthly Revenue ($K)</span>
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart('revenue', this)">Rev</button>
          <button class="chart-tab" onclick="switchChart('margin', this)">Margin</button>
          <button class="chart-tab" onclick="switchChart('units', this)">Units</button>
        </div>
      </div>
      <canvas id="sparkCanvas" width="280" height="90"></canvas>
    </div>
  </div>

  <!-- Top Products Table -->
  <div class="table-section">
    <div class="section-label">Top Products by Revenue</div>
    <div class="chart-card" style="padding:10px 12px;">
      <table class="data-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Revenue</th>
            <th style="width:80px">Share</th>
          </tr>
        </thead>
        <tbody id="productTable">
          <tr><td colspan="3" style="text-align:center;color:var(--muted);padding:12px">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="section-label">Quick Actions</div>
  <div class="actions">
    <button class="action-btn" onclick="buildKPICards()">
      <span class="icon">🃏</span>
      Build KPI Cards
      <span>Format selection</span>
    </button>
    <button class="action-btn" onclick="insertChart()">
      <span class="icon">📈</span>
      Insert Chart
      <span>From selection</span>
    </button>
    <button class="action-btn" onclick="highlightErrors()">
      <span class="icon">🔍</span>
      Find Errors
      <span>Scan workbook</span>
    </button>
    <button class="action-btn" onclick="exportSnapshot()">
      <span class="icon">📤</span>
      Copy Summary
      <span>To clipboard</span>
    </button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
let chartData = {
  revenue:   [285,260,310,275,320,340,308,295,298,315,330,340],
  margin:    [42,39,44,41,45,47,43,42,43,45,46,48],
  units:     [1240,1100,1380,1190,1420,1510,1350,1280,1290,1340,1410,1510]
};
let activeMetric = 'revenue';
let officeReady  = false;

// ── Office Init ──────────────────────────────────────────────────────────────
Office.onReady(info => {
  officeReady = true;
  if (info.host === Office.HostType.Excel) {
    setStatus('Connected to Excel', 'ok');
    loadData();
  } else {
    setStatus('Preview mode (no Excel host)', 'ok');
    renderDemoData();
  }
}).catch(() => {
  setStatus('Preview mode (Office JS unavailable)', 'ok');
  renderDemoData();
});

// ── Load Data from Workbook ─────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('Reading workbook…', 'loading');

  if (!officeReady) { renderDemoData(); btn.classList.remove('spinning'); return; }

  try {
    await Excel.run(async ctx => {
      const sheets = ctx.workbook.worksheets;
      sheets.load('items/name');
      await ctx.sync();

      const names = sheets.items.map(s => s.name);
      const salesSheet = sheets.items.find(s =>
        s.name.toLowerCase().includes('sales') ||
        s.name.toLowerCase().includes('data'));

      if (!salesSheet) {
        setStatus('No "Sales Data" sheet found — showing demo', 'ok');
        renderDemoData(); btn.classList.remove('spinning'); return;
      }

      // Read B2:G13 (months × metrics)
      const range = salesSheet.getRange('B2:G13');
      range.load('values');
      await ctx.sync();

      const vals = range.values; // 12 rows × 6 cols
      if (vals.length < 2) { renderDemoData(); btn.classList.remove('spinning'); return; }

      chartData.revenue  = vals.map(r => parseFloat(r[0]) || 0);
      chartData.units    = vals.map(r => parseFloat(r[1]) || 0);
      chartData.margin   = vals.map(r => parseFloat(r[4]) * 100 || 0); // col F = margin %

      const totalRev  = chartData.revenue.reduce((a,b)=>a+b,0);
      const totalUnit = chartData.units.reduce((a,b)=>a+b,0);
      const avgMargin = chartData.margin.reduce((a,b)=>a+b,0)/chartData.margin.length;

      // Customers from col G
      const custRange = salesSheet.getRange('G2:G13');
      custRange.load('values');
      await ctx.sync();
      const totalCust = custRange.values.reduce((a,r)=>a+(parseFloat(r[0])||0),0);

      renderKPIs(totalRev, totalUnit, avgMargin, totalCust);
      drawChart(activeMetric);
      renderProductTable();
      setStatus(`Last updated ${new Date().toLocaleTimeString()}`, 'ok');
    });
  } catch(e) {
    setStatus('Could not read sheet: ' + e.message, 'error');
    renderDemoData();
  }
  btn.classList.remove('spinning');
}

// ── Render KPIs ─────────────────────────────────────────────────────────────
function renderKPIs(rev, units, margin, cust) {
  animateValue('kpi-revenue',   0, rev,    1000, v => '$'+(v/1000).toFixed(0)+'M');
  animateValue('kpi-units',     0, units,  1000, v => (v/1000).toFixed(1)+'K');
  animateValue('kpi-margin',    0, margin, 1000, v => v.toFixed(1)+'%');
  animateValue('kpi-customers', 0, cust,   1000, v => Math.round(v).toString());

  setBadge('kpi-revenue-badge',   '+12.4%', 'up');
  setBadge('kpi-units-badge',     '+8.1%',  'up');
  setBadge('kpi-margin-badge',    '43.5%',  'neutral');
  setBadge('kpi-customers-badge', '+18 new','up');
}

function renderDemoData() {
  renderKPIs(1233, 15820, 43.5, 517);
  drawChart(activeMetric);
  renderProductTable();
  setStatus('Preview mode — demo data', 'ok');
}

function animateValue(id, from, to, duration, fmt) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function setBadge(id, text, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'badge ' + cls;
}

// ── Canvas Sparkline ─────────────────────────────────────────────────────────
function drawChart(metric) {
  const canvas = document.getElementById('sparkCanvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.clientWidth * devicePixelRatio || 280;
  const H = canvas.clientHeight * devicePixelRatio || 90;
  canvas.width  = W;
  canvas.height = H;

  const data   = chartData[metric];
  const months = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  const pad    = { l:6, r:6, t:10, b:22 };
  const minV   = Math.min(...data);
  const maxV   = Math.max(...data);
  const range  = maxV - minV || 1;
  const dpr    = devicePixelRatio || 1;

  function xOf(i) { return pad.l*dpr + i * (W - (pad.l+pad.r)*dpr) / (data.length-1); }
  function yOf(v) { return pad.t*dpr + (1-(v-minV)/range)*(H-(pad.t+pad.b)*dpr); }

  ctx.clearRect(0,0,W,H);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, pad.t*dpr, 0, H - pad.b*dpr);
  grad.addColorStop(0, 'rgba(0,229,255,0.25)');
  grad.addColorStop(1, 'rgba(0,229,255,0)');

  ctx.beginPath();
  data.forEach((v,i) => i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v)));
  ctx.lineTo(xOf(data.length-1), H-pad.b*dpr);
  ctx.lineTo(xOf(0), H-pad.b*dpr);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((v,i) => i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v)));
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth   = 1.5 * dpr;
  ctx.lineJoin    = 'round';
  ctx.stroke();

  // Dots
  data.forEach((v,i) => {
    ctx.beginPath();
    ctx.arc(xOf(i), yOf(v), 2*dpr, 0, Math.PI*2);
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
  });

  // Month labels
  ctx.fillStyle   = 'rgba(123,145,168,0.9)';
  ctx.font        = `${9*dpr}px "DM Mono", monospace`;
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'top';
  months.forEach((m,i) => ctx.fillText(m, xOf(i), H-(pad.b-4)*dpr));
}

function switchChart(metric, btn) {
  activeMetric = metric;
  document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawChart(metric);
}

window.addEventListener('resize', () => drawChart(activeMetric));

// ── Product Table ────────────────────────────────────────────────────────────
function renderProductTable() {
  const products = [
    { name:'Alpha Pro',        rev:1233 },
    { name:'Beta Suite',       rev: 833 },
    { name:'Gamma Cloud',      rev: 635 },
    { name:'Delta Analytics',  rev: 392 },
  ];
  const total = products.reduce((a,p)=>a+p.rev,0);
  const tbody = document.getElementById('productTable');
  tbody.innerHTML = products.map(p => {
    const pct = (p.rev/total*100).toFixed(0);
    return `<tr>
      <td>${p.name}</td>
      <td style="font-family:'DM Mono',monospace;font-size:10px">$${(p.rev).toLocaleString()}K</td>
      <td>
        <div class="bar-cell">
          <div class="mini-bar" style="width:${pct}%"></div>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${pct}%</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(msg, type='ok') {
  const bar  = document.getElementById('statusBar');
  const text = document.getElementById('statusText');
  text.textContent = msg;
  bar.className = type === 'loading' ? 'loading' : type === 'error' ? 'error' : '';
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Quick Actions ────────────────────────────────────────────────────────────
async function buildKPICards() {
  if (!officeReady) { showToast('⚡ KPI Cards built (demo mode)'); return; }
  try {
    await Excel.run(async ctx => {
      const range = ctx.workbook.getSelectedRange();
      range.load('address');
      await ctx.sync();

      range.format.fill.color    = '#1a2d42';
      range.format.font.color    = '#00e5ff';
      range.format.font.bold     = true;
      range.format.font.size     = 18;
      range.format.horizontalAlignment = 'Center';
      range.format.verticalAlignment   = 'Center';
      await ctx.sync();
      showToast('✅ KPI style applied to ' + range.address);
    });
  } catch(e) { showToast('⚠️ ' + e.message); }
}

async function insertChart() {
  if (!officeReady) { showToast('📈 Chart inserted (demo mode)'); return; }
  try {
    await Excel.run(async ctx => {
      const sheet = ctx.workbook.worksheets.getActiveWorksheet();
      const range = ctx.workbook.getSelectedRange();
      range.load('address');
      await ctx.sync();

      const chart = sheet.charts.add(Excel.ChartType.columnClustered, range);
      chart.title.text = 'Analytics Chart';
      chart.legend.position = Excel.ChartLegendPosition.bottom;
      await ctx.sync();
      showToast('✅ Chart inserted from selection');
    });
  } catch(e) { showToast('⚠️ ' + e.message); }
}

async function highlightErrors() {
  if (!officeReady) { showToast('🔍 No errors found (demo mode)'); return; }
  try {
    await Excel.run(async ctx => {
      const sheet = ctx.workbook.worksheets.getActiveWorksheet();
      const used  = sheet.getUsedRange();
      used.load('values,address');
      await ctx.sync();

      let errorCount = 0;
      const vals = used.values;
      for (let r = 0; r < vals.length; r++) {
        for (let c = 0; c < vals[r].length; c++) {
          const v = String(vals[r][c]);
          if (v.startsWith('#')) {
            const cell = used.getCell(r, c);
            cell.format.fill.color = '#4a0010';
            cell.format.font.color = '#ef476f';
            errorCount++;
          }
        }
      }
      await ctx.sync();
      showToast(errorCount > 0
        ? `⚠️ ${errorCount} error(s) highlighted in red`
        : '✅ No formula errors found!');
    });
  } catch(e) { showToast('⚠️ ' + e.message); }
}

async function exportSnapshot() {
  const summary = `ANALYTICS PRO SNAPSHOT — ${new Date().toLocaleDateString()}
Revenue:   $${(1233).toLocaleString()}K
Units:     15,820
Margin:    43.5%
Customers: 517`;
  try {
    await navigator.clipboard.writeText(summary);
    showToast('📋 Summary copied to clipboard!');
  } catch {
    showToast('📋 ' + summary.split('\n')[0]);
  }
}
