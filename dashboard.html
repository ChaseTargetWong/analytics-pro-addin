<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <!--
    Content-Security-Policy — required for Office Add-ins on GitHub Pages (HTTPS).
    Whitelists Office JS CDN, Google Fonts, and same-origin only.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    connect-src 'self' https://appsforoffice.microsoft.com;
    img-src     'self' data:;
    frame-ancestors https://excel.officeapps.live.com https://*.officeapps.live.com ms-appx-web: https://*.microsoft.com;
  "/>
  <title>Analytics Pro — Dashboard</title>

  <!-- Office JS must load synchronously before any Office API usage -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --navy:       #0d1b2a;
      --navy-mid:   #1a2d42;
      --navy-light: #243b55;
      --cyan:       #00e5ff;
      --cyan-dim:   rgba(0,229,255,0.12);
      --gold:       #ffd166;
      --green:      #06d6a0;
      --red:        #ef476f;
      --text:       #e8edf2;
      --muted:      #7b91a8;
      --border:     rgba(0,229,255,0.15);
      --card:       rgba(26,45,66,0.8);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow-x:hidden; }

    body {
      font-family:'DM Sans', sans-serif;
      background:var(--navy);
      color:var(--text);
      font-size:13px;
    }

    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size:32px 32px;
      pointer-events:none; z-index:0;
    }

    .pane { position:relative; z-index:1; padding:14px 14px 32px; }

    /* Header */
    .header {
      display:flex; align-items:center; gap:10px;
      padding-bottom:14px; border-bottom:1px solid var(--border);
      margin-bottom:16px;
      animation:fadeDown 0.4s ease both;
    }
    .logo {
      width:32px; height:32px;
      background:linear-gradient(135deg,var(--cyan),#0077b6);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .header-text h1 {
      font-family:'Syne',sans-serif; font-size:15px; font-weight:800;
      color:var(--cyan); letter-spacing:0.03em;
    }
    .header-text p { color:var(--muted); font-size:10px; margin-top:1px; }

    .refresh-btn {
      margin-left:auto;
      background:var(--cyan-dim); border:1px solid var(--border);
      color:var(--cyan); border-radius:6px; padding:5px 10px;
      font-size:11px; font-family:'DM Sans',sans-serif;
      cursor:pointer; transition:background 0.2s;
      display:flex; align-items:center; gap:5px; white-space:nowrap;
    }
    .refresh-btn:hover { background:rgba(0,229,255,0.2); }
    .refresh-btn.spinning svg { animation:spin 0.8s linear infinite; }

    /* Status bar */
    #statusBar {
      font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
      background:rgba(0,0,0,0.3); border:1px solid var(--border);
      border-radius:6px; padding:6px 10px; margin-bottom:14px;
      min-height:28px; display:flex; align-items:center; gap:6px;
      animation:fadeDown 0.4s 0.1s ease both; word-break:break-word;
    }
    .dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--green); flex-shrink:0;
      box-shadow:0 0 6px var(--green);
    }
    #statusBar.loading .dot { background:var(--gold); box-shadow:0 0 6px var(--gold); animation:pulse 1s infinite; }
    #statusBar.error   .dot { background:var(--red);  box-shadow:0 0 6px var(--red); }

    /* Section label */
    .section-label {
      font-family:'DM Mono',monospace; font-size:9px;
      letter-spacing:0.12em; color:var(--muted);
      text-transform:uppercase; margin-bottom:8px;
    }

    /* KPI Grid */
    .kpi-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
    .kpi-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:10px; padding:12px 12px 10px;
      position:relative; overflow:hidden;
      opacity:0; animation:fadeUp 0.4s ease forwards;
      backdrop-filter:blur(8px);
    }
    .kpi-card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background:linear-gradient(90deg, var(--glow-a,#00e5ff), var(--glow-b,#0077b6));
    }
    .kpi-card:nth-child(1){ --glow-a:#00e5ff; --glow-b:#0077b6; animation-delay:0.15s; }
    .kpi-card:nth-child(2){ --glow-a:#ffd166; --glow-b:#ff9e00; animation-delay:0.22s; }
    .kpi-card:nth-child(3){ --glow-a:#06d6a0; --glow-b:#00b4d8; animation-delay:0.29s; }
    .kpi-card:nth-child(4){ --glow-a:#ef476f; --glow-b:#f72585; animation-delay:0.36s; }

    .kpi-label { font-size:9px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:6px; }
    .kpi-value { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--text); line-height:1; margin-bottom:4px; }
    .kpi-meta  { font-size:10px; display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
    .badge     { font-family:'DM Mono',monospace; font-size:9px; padding:2px 5px; border-radius:4px; font-weight:500; }
    .badge.up      { background:rgba(6,214,160,0.15);  color:var(--green); }
    .badge.down    { background:rgba(239,71,111,0.15); color:var(--red); }
    .badge.neutral { background:rgba(255,209,102,0.15);color:var(--gold); }

    /* Chart */
    .chart-section { margin-bottom:16px; animation:fadeUp 0.4s 0.4s ease both; opacity:0; }
    .chart-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px; backdrop-filter:blur(8px); }
    .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .chart-title  { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; }
    .chart-tabs   { display:flex; gap:4px; }
    .chart-tab {
      font-size:9px; padding:3px 7px; border-radius:4px;
      border:1px solid var(--border); background:transparent; color:var(--muted);
      cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif;
    }
    .chart-tab.active { background:var(--cyan-dim); color:var(--cyan); border-color:var(--cyan); }
    .canvas-wrap { width:100%; height:90px; position:relative; }
    #sparkCanvas { position:absolute; inset:0; width:100%; height:100%; display:block; }

    /* Table */
    .table-section { margin-bottom:16px; animation:fadeUp 0.4s 0.5s ease both; opacity:0; }
    .data-table { width:100%; border-collapse:collapse; }
    .data-table th {
      font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em;
      color:var(--muted); text-transform:uppercase;
      padding:5px 6px; text-align:left; border-bottom:1px solid var(--border);
    }
    .data-table td { padding:6px; font-size:11px; border-bottom:1px solid rgba(0,229,255,0.05); vertical-align:middle; }
    .data-table tr:hover td { background:rgba(0,229,255,0.04); }
    .bar-cell { display:flex; align-items:center; gap:6px; }
    .mini-bar { height:4px; border-radius:2px; background:var(--cyan); min-width:2px; }

    /* Actions */
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:8px; animation:fadeUp 0.4s 0.6s ease both; opacity:0; }
    .action-btn {
      background:var(--card); border:1px solid var(--border);
      border-radius:8px; padding:10px 8px; color:var(--text);
      font-family:'DM Sans',sans-serif; font-size:11px; cursor:pointer;
      transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:4px;
      text-align:center; backdrop-filter:blur(8px);
    }
    .action-btn:hover  { border-color:var(--cyan); background:var(--cyan-dim); color:var(--cyan); transform:translateY(-1px); }
    .action-btn:active { transform:translateY(0); }
    .action-btn .icon  { font-size:18px; }
    .action-btn span   { font-size:10px; color:var(--muted); }

    /* Toast */
    #toast {
      position:fixed; bottom:16px; left:14px; right:14px;
      background:var(--navy-light); border:1px solid var(--cyan);
      border-radius:8px; padding:10px 12px;
      font-size:11px; font-family:'DM Mono',monospace; color:var(--cyan);
      transform:translateY(60px); opacity:0;
      transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index:999; word-break:break-word;
    }
    #toast.show { transform:translateY(0); opacity:1; }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(10px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>
</head>
<body>
<div class="pane">

  <div class="header">
    <div class="logo">&#9889;</div>
    <div class="header-text">
      <h1>ANALYTICS PRO</h1>
      <p>Live workbook dashboard</p>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
      </svg>
      Refresh
    </button>
  </div>

  <div id="statusBar">
    <div class="dot"></div>
    <span id="statusText">Initialising&#8230;</span>
  </div>

  <div class="section-label">Key Metrics</div>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Total Revenue</div>
      <div class="kpi-value" id="kpi-revenue">&#8212;</div>
      <div class="kpi-meta"><span class="badge up" id="kpi-revenue-badge">&#8212;</span>&nbsp;vs last period</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Units Sold</div>
      <div class="kpi-value" id="kpi-units">&#8212;</div>
      <div class="kpi-meta"><span class="badge neutral" id="kpi-units-badge">&#8212;</span>&nbsp;YTD</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Gross Margin</div>
      <div class="kpi-value" id="kpi-margin">&#8212;</div>
      <div class="kpi-meta"><span class="badge up" id="kpi-margin-badge">&#8212;</span>&nbsp;avg</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Customers</div>
      <div class="kpi-value" id="kpi-customers">&#8212;</div>
      <div class="kpi-meta"><span class="badge up" id="kpi-customers-badge">&#8212;</span>&nbsp;new</div>
    </div>
  </div>

  <div class="chart-section">
    <div class="section-label">Revenue Trend</div>
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Monthly ($K)</span>
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart('revenue',this)">Rev</button>
          <button class="chart-tab"        onclick="switchChart('margin',this)">Margin</button>
          <button class="chart-tab"        onclick="switchChart('units',this)">Units</button>
        </div>
      </div>
      <div class="canvas-wrap"><canvas id="sparkCanvas"></canvas></div>
    </div>
  </div>

  <div class="table-section">
    <div class="section-label">Top Products by Revenue</div>
    <div class="chart-card" style="padding:10px 12px;">
      <table class="data-table">
        <thead><tr><th>Product</th><th>Revenue</th><th style="width:80px">Share</th></tr></thead>
        <tbody id="productTable">
          <tr><td colspan="3" style="text-align:center;color:var(--muted);padding:12px">Loading&#8230;</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="section-label">Quick Actions</div>
  <div class="actions">
    <button class="action-btn" onclick="buildKPICards()">
      <span class="icon">&#127183;</span>Build KPI Cards<span>Format selection</span>
    </button>
    <button class="action-btn" onclick="insertChart()">
      <span class="icon">&#128200;</span>Insert Chart<span>From selection</span>
    </button>
    <button class="action-btn" onclick="highlightErrors()">
      <span class="icon">&#128269;</span>Find Errors<span>Scan workbook</span>
    </button>
    <button class="action-btn" onclick="exportSnapshot()">
      <span class="icon">&#128228;</span>Copy Summary<span>To clipboard</span>
    </button>
  </div>
</div>

<div id="toast"></div>

<script type="text/javascript">
/* ── State ── */
var chartData = {
  revenue: [285,260,310,275,320,340,308,295,298,315,330,340],
  margin:  [42,39,44,41,45,47,43,42,43,45,46,48],
  units:   [1240,1100,1380,1190,1420,1510,1350,1280,1290,1340,1410,1510]
};
var activeMetric = 'revenue';
var officeReady  = false;

/* ── Office Init ── */
Office.onReady(function(info) {
  officeReady = true;
  if (info.host === Office.HostType.Excel) {
    setStatus('Connected to Excel', 'ok');
    loadData();
  } else {
    setStatus('Preview mode — no Excel host', 'ok');
    renderDemoData();
  }
}).catch(function() {
  setStatus('Preview mode — Office JS unavailable', 'ok');
  renderDemoData();
});

/* Fallback if Office.onReady never fires (plain browser preview) */
setTimeout(function() {
  var txt = document.getElementById('statusText');
  if (txt && txt.textContent.indexOf('Initialising') !== -1) {
    officeReady = false;
    setStatus('Preview mode — open in Excel to connect live data', 'ok');
    renderDemoData();
  }
}, 3500);

/* ── Load from Workbook ── */
function loadData() {
  var btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('Reading workbook\u2026', 'loading');

  if (!officeReady) { renderDemoData(); btn.classList.remove('spinning'); return; }

  Excel.run(function(ctx) {
    var sheets = ctx.workbook.worksheets;
    sheets.load('items/name');
    return ctx.sync().then(function() {
      var salesSheet = null;
      for (var i = 0; i < sheets.items.length; i++) {
        var n = sheets.items[i].name.toLowerCase();
        if (n.indexOf('sales') !== -1 || n.indexOf('data') !== -1) { salesSheet = sheets.items[i]; break; }
      }
      if (!salesSheet) {
        setStatus('No Sales Data sheet found \u2014 demo mode', 'ok');
        renderDemoData(); btn.classList.remove('spinning'); return;
      }
      var range = salesSheet.getRange('B2:G13');
      range.load('values');
      return ctx.sync().then(function() {
        var vals = range.values;
        if (!vals || vals.length < 2) { renderDemoData(); btn.classList.remove('spinning'); return; }
        chartData.revenue = vals.map(function(r){ return parseFloat(r[0]) || 0; });
        chartData.units   = vals.map(function(r){ return parseFloat(r[1]) || 0; });
        chartData.margin  = vals.map(function(r){ return (parseFloat(r[4]) || 0) * 100; });
        var totalRev  = chartData.revenue.reduce(function(a,b){ return a+b; }, 0);
        var totalUnit = chartData.units.reduce(function(a,b){ return a+b; }, 0);
        var avgMargin = chartData.margin.reduce(function(a,b){ return a+b; }, 0) / chartData.margin.length;
        var custRange = salesSheet.getRange('G2:G13');
        custRange.load('values');
        return ctx.sync().then(function() {
          var totalCust = custRange.values.reduce(function(a,r){ return a+(parseFloat(r[0])||0); }, 0);
          renderKPIs(totalRev, totalUnit, avgMargin, totalCust);
          drawChart(activeMetric);
          renderProductTable();
          setStatus('Last updated ' + new Date().toLocaleTimeString(), 'ok');
          btn.classList.remove('spinning');
        });
      });
    });
  }).catch(function(e) {
    setStatus('Error: ' + e.message, 'error');
    renderDemoData();
    btn.classList.remove('spinning');
  });
}

/* ── KPIs ── */
function renderKPIs(rev, units, margin, cust) {
  animateValue('kpi-revenue',   0, rev,    1000, function(v){ return '$'+(v/1000).toFixed(0)+'M'; });
  animateValue('kpi-units',     0, units,  1000, function(v){ return (v/1000).toFixed(1)+'K'; });
  animateValue('kpi-margin',    0, margin, 1000, function(v){ return v.toFixed(1)+'%'; });
  animateValue('kpi-customers', 0, cust,   1000, function(v){ return Math.round(v)+''; });
  setBadge('kpi-revenue-badge',   '+12.4%',  'up');
  setBadge('kpi-units-badge',     '+8.1%',   'up');
  setBadge('kpi-margin-badge',    '43.5%',   'neutral');
  setBadge('kpi-customers-badge', '+18 new', 'up');
}

function renderDemoData() {
  renderKPIs(1233, 15820, 43.5, 517);
  drawChart(activeMetric);
  renderProductTable();
  setStatus('Preview mode \u2014 demo data', 'ok');
}

function animateValue(id, from, to, duration, fmt) {
  var el = document.getElementById(id);
  if (!el) return;
  var start = null;
  function step(ts) {
    if (!start) start = ts;
    var t    = Math.min((ts - start) / duration, 1);
    var ease = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function setBadge(id, text, cls) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'badge ' + cls;
}

/* ── Sparkline ── */
function drawChart(metric) {
  var canvas = document.getElementById('sparkCanvas');
  if (!canvas) return;
  var wrap = canvas.parentElement;
  var dpr  = window.devicePixelRatio || 1;
  var W    = wrap.clientWidth  * dpr;
  var H    = wrap.clientHeight * dpr;
  if (W === 0 || H === 0) { setTimeout(function(){ drawChart(metric); }, 100); return; }
  canvas.width  = W;
  canvas.height = H;

  var ctx    = canvas.getContext('2d');
  var data   = chartData[metric];
  var months = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  var pad    = { l:6, r:6, t:10, b:22 };
  var minV   = Math.min.apply(null, data);
  var maxV   = Math.max.apply(null, data);
  var rng    = maxV - minV || 1;

  function xOf(i){ return pad.l*dpr + i*(W-(pad.l+pad.r)*dpr)/(data.length-1); }
  function yOf(v){ return pad.t*dpr + (1-(v-minV)/rng)*(H-(pad.t+pad.b)*dpr); }

  ctx.clearRect(0,0,W,H);

  var grad = ctx.createLinearGradient(0,pad.t*dpr,0,H-pad.b*dpr);
  grad.addColorStop(0,'rgba(0,229,255,0.25)');
  grad.addColorStop(1,'rgba(0,229,255,0)');
  ctx.beginPath();
  data.forEach(function(v,i){ i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v)); });
  ctx.lineTo(xOf(data.length-1),H-pad.b*dpr);
  ctx.lineTo(xOf(0),H-pad.b*dpr);
  ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();

  ctx.beginPath();
  data.forEach(function(v,i){ i===0 ? ctx.moveTo(xOf(i),yOf(v)) : ctx.lineTo(xOf(i),yOf(v)); });
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=1.5*dpr; ctx.lineJoin='round'; ctx.stroke();

  data.forEach(function(v,i){
    ctx.beginPath(); ctx.arc(xOf(i),yOf(v),2*dpr,0,Math.PI*2);
    ctx.fillStyle='#00e5ff'; ctx.fill();
  });

  ctx.fillStyle='rgba(123,145,168,0.9)';
  ctx.font=(9*dpr)+'px "DM Mono",monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  months.forEach(function(m,i){ ctx.fillText(m,xOf(i),H-(pad.b-4)*dpr); });
}

function switchChart(metric, btn) {
  activeMetric = metric;
  var tabs = document.querySelectorAll('.chart-tab');
  for (var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  btn.classList.add('active');
  drawChart(metric);
}

window.addEventListener('resize', function(){ drawChart(activeMetric); });

/* ── Product Table ── */
function renderProductTable() {
  var products = [
    { name:'Alpha Pro',       rev:1233 },
    { name:'Beta Suite',      rev: 833 },
    { name:'Gamma Cloud',     rev: 635 },
    { name:'Delta Analytics', rev: 392 }
  ];
  var total = products.reduce(function(a,p){ return a+p.rev; }, 0);
  var html  = products.map(function(p) {
    var pct = (p.rev/total*100).toFixed(0);
    return '<tr>'
      + '<td>' + p.name + '</td>'
      + '<td style="font-family:\'DM Mono\',monospace;font-size:10px">$' + p.rev.toLocaleString() + 'K</td>'
      + '<td><div class="bar-cell">'
      + '<div class="mini-bar" style="width:' + pct + '%"></div>'
      + '<span style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--muted)">' + pct + '%</span>'
      + '</div></td></tr>';
  });
  document.getElementById('productTable').innerHTML = html.join('');
}

/* ── Status / Toast ── */
function setStatus(msg, type) {
  var bar  = document.getElementById('statusBar');
  var text = document.getElementById('statusText');
  if (!bar || !text) return;
  text.textContent = msg;
  bar.className = (type==='loading') ? 'loading' : (type==='error') ? 'error' : '';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}

/* ── Quick Actions ── */
function buildKPICards() {
  if (!officeReady) { showToast('KPI Cards built (demo mode)'); return; }
  Excel.run(function(ctx) {
    var range = ctx.workbook.getSelectedRange();
    range.load('address');
    return ctx.sync().then(function() {
      range.format.fill.color = '#1a2d42';
      range.format.font.color = '#00e5ff';
      range.format.font.bold  = true;
      range.format.font.size  = 18;
      range.format.horizontalAlignment = 'Center';
      range.format.verticalAlignment   = 'Center';
      return ctx.sync().then(function(){ showToast('KPI style applied to ' + range.address); });
    });
  }).catch(function(e){ showToast('Error: ' + e.message); });
}

function insertChart() {
  if (!officeReady) { showToast('Chart inserted (demo mode)'); return; }
  Excel.run(function(ctx) {
    var sheet = ctx.workbook.worksheets.getActiveWorksheet();
    var range = ctx.workbook.getSelectedRange();
    range.load('address');
    return ctx.sync().then(function() {
      var chart = sheet.charts.add(Excel.ChartType.columnClustered, range);
      chart.title.text = 'Analytics Chart';
      chart.legend.position = Excel.ChartLegendPosition.bottom;
      return ctx.sync().then(function(){ showToast('Chart inserted from ' + range.address); });
    });
  }).catch(function(e){ showToast('Error: ' + e.message); });
}

function highlightErrors() {
  if (!officeReady) { showToast('No errors found (demo mode)'); return; }
  Excel.run(function(ctx) {
    var sheet = ctx.workbook.worksheets.getActiveWorksheet();
    var used  = sheet.getUsedRange();
    used.load('values');
    return ctx.sync().then(function() {
      var errorCount = 0;
      var vals = used.values;
      for (var r=0; r<vals.length; r++) {
        for (var c=0; c<vals[r].length; c++) {
          if (String(vals[r][c]).charAt(0)==='#') {
            var cell = used.getCell(r,c);
            cell.format.fill.color = '#4a0010';
            cell.format.font.color = '#ef476f';
            errorCount++;
          }
        }
      }
      return ctx.sync().then(function(){
        showToast(errorCount>0 ? errorCount+' error(s) highlighted' : 'No formula errors found!');
      });
    });
  }).catch(function(e){ showToast('Error: ' + e.message); });
}

function exportSnapshot() {
  var summary = 'ANALYTICS PRO SNAPSHOT \u2014 ' + new Date().toLocaleDateString() + '\n'
    + 'Revenue:   $1,233K\nUnits:     15,820\nMargin:    43.5%\nCustomers: 517';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(summary)
      .then(function(){ showToast('Summary copied to clipboard!'); })
      .catch(function(){ showToast('Clipboard blocked \u2014 try in Excel'); });
  } else {
    showToast('Clipboard not available here');
  }
}
