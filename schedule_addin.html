<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src  'self' 'unsafe-inline' https://appsforoffice.microsoft.com https://ajax.aspnetcdn.com;
    style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src    'self' https://fonts.gstatic.com;
    connect-src 'self' https://appsforoffice.microsoft.com https://api.anthropic.com;
    img-src     'self' data:;
    frame-ancestors https://excel.officeapps.live.com https://*.officeapps.live.com ms-appx-web: https://*.microsoft.com;
  "/>
  <title>Shift Scheduler AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #222222;
      --border:    #2e2e2e;
      --orange:    #ff6b2b;
      --orange-dim:rgba(255,107,43,0.12);
      --orange-glow:rgba(255,107,43,0.35);
      --yellow:    #ffd60a;
      --green:     #39d353;
      --red:       #ff4757;
      --text:      #f0f0f0;
      --muted:     #666;
      --muted2:    #888;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow-x:hidden; background:var(--bg); }

    body {
      font-family:'Barlow', sans-serif;
      color:var(--text);
      font-size:13px;
    }

    /* Subtle noise texture overlay */
    body::after {
      content:'';
      position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:999; opacity:0.4;
    }

    .pane { padding:14px 14px 40px; position:relative; z-index:1; }

    /* ── Header ── */
    .header {
      margin-bottom:18px;
      padding-bottom:14px;
      border-bottom:1px solid var(--border);
      animation: slideIn 0.4s ease both;
    }
    .header-top { display:flex; align-items:flex-start; gap:10px; }
    .header-icon {
      font-size:28px; line-height:1;
      filter: drop-shadow(0 0 8px var(--orange-glow));
    }
    .header-title {
      font-family:'Bebas Neue', sans-serif;
      font-size:26px; letter-spacing:0.05em;
      color:var(--orange);
      line-height:1;
      text-shadow: 0 0 20px var(--orange-glow);
    }
    .header-sub {
      font-family:'Barlow Condensed', sans-serif;
      font-size:11px; font-weight:500;
      letter-spacing:0.15em; text-transform:uppercase;
      color:var(--muted2); margin-top:2px;
    }

    /* ── API Key section ── */
    .api-section {
      background:var(--surface);
      border:1px solid var(--border);
      border-left:3px solid var(--orange);
      border-radius:6px;
      padding:10px 12px;
      margin-bottom:14px;
      animation: slideIn 0.4s 0.05s ease both; opacity:0;
    }
    .api-label {
      font-family:'Barlow Condensed', sans-serif;
      font-size:10px; font-weight:700; letter-spacing:0.15em;
      text-transform:uppercase; color:var(--orange);
      margin-bottom:6px; display:flex; align-items:center; gap:6px;
    }
    .api-label .dot { width:5px; height:5px; border-radius:50%; background:var(--orange); display:inline-block; }
    .api-input {
      width:100%; background:var(--bg);
      border:1px solid var(--border); border-radius:4px;
      color:var(--text); font-family:'Barlow', sans-serif;
      font-size:11px; padding:7px 10px;
      outline:none; transition:border-color 0.2s;
      letter-spacing:0.05em;
    }
    .api-input:focus { border-color:var(--orange); }
    .api-hint { font-size:9px; color:var(--muted); margin-top:5px; }
    .api-hint a { color:var(--orange); text-decoration:none; }

    /* ── Section ── */
    .section {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:6px;
      padding:12px;
      margin-bottom:12px;
      animation: slideIn 0.4s ease both; opacity:0;
    }
    .section:nth-child(3){ animation-delay:0.1s; }
    .section:nth-child(4){ animation-delay:0.15s; }
    .section:nth-child(5){ animation-delay:0.2s; }
    .section:nth-child(6){ animation-delay:0.25s; }

    .sec-title {
      font-family:'Barlow Condensed', sans-serif;
      font-size:11px; font-weight:700; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--muted2);
      margin-bottom:10px;
      display:flex; align-items:center; gap:6px;
    }
    .sec-title::before {
      content:''; display:inline-block;
      width:10px; height:2px; background:var(--orange); border-radius:1px;
    }

    /* Row inputs */
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }

    label {
      display:block;
      font-size:9px; font-weight:600; letter-spacing:0.1em;
      text-transform:uppercase; color:var(--muted2);
      margin-bottom:4px;
    }

    input[type="text"],
    input[type="number"],
    input[type="month"],
    select,
    textarea {
      width:100%; background:var(--bg);
      border:1px solid var(--border); border-radius:4px;
      color:var(--text); font-family:'Barlow', sans-serif;
      font-size:12px; padding:7px 8px;
      outline:none; transition:border-color 0.2s;
    }
    input:focus, select:focus, textarea:focus { border-color:var(--orange); }
    select option { background:var(--surface); }
    textarea { resize:vertical; min-height:60px; line-height:1.5; }

    /* Employee list */
    #employeeList { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
    .emp-row {
      display:grid; grid-template-columns:1fr 1fr auto;
      gap:6px; align-items:center;
      animation: slideIn 0.25s ease both;
    }
    .emp-remove {
      background:transparent; border:1px solid var(--border);
      color:var(--muted); border-radius:4px; width:26px; height:26px;
      cursor:pointer; font-size:14px; line-height:1;
      transition:all 0.2s; display:flex; align-items:center; justify-content:center;
    }
    .emp-remove:hover { border-color:var(--red); color:var(--red); }

    .add-btn {
      background:transparent; border:1px dashed var(--border);
      color:var(--muted2); border-radius:4px; padding:6px;
      width:100%; cursor:pointer; font-size:11px;
      font-family:'Barlow', sans-serif;
      transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .add-btn:hover { border-color:var(--orange); color:var(--orange); }

    /* Shift toggles */
    .shift-toggles { display:flex; gap:6px; flex-wrap:wrap; }
    .shift-toggle {
      background:var(--bg); border:1px solid var(--border);
      border-radius:4px; padding:5px 10px;
      font-size:10px; font-family:'Barlow Condensed', sans-serif;
      font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; transition:all 0.2s; color:var(--muted2);
      user-select:none;
    }
    .shift-toggle.active { background:var(--orange-dim); border-color:var(--orange); color:var(--orange); }

    /* Generate button */
    .gen-btn {
      width:100%; padding:13px;
      background:var(--orange);
      border:none; border-radius:6px;
      font-family:'Bebas Neue', sans-serif;
      font-size:18px; letter-spacing:0.1em;
      color:#000; cursor:pointer;
      transition:all 0.2s;
      display:flex; align-items:center; justify-content:center; gap:8px;
      margin-bottom:12px;
      box-shadow: 0 0 20px var(--orange-glow);
      animation: slideIn 0.4s 0.3s ease both; opacity:0;
    }
    .gen-btn:hover { background:#ff8050; box-shadow:0 0 30px var(--orange-glow); transform:translateY(-1px); }
    .gen-btn:active { transform:translateY(0); }
    .gen-btn:disabled { background:#333; color:#555; cursor:not-allowed; box-shadow:none; transform:none; }
    .gen-btn .spinner {
      width:16px; height:16px;
      border:2px solid rgba(0,0,0,0.3);
      border-top-color:#000;
      border-radius:50%;
      animation:spin 0.7s linear infinite;
      display:none;
    }
    .gen-btn.loading .spinner { display:block; }
    .gen-btn.loading .btn-text { display:none; }

    /* ── Output ── */
    #outputWrap {
      display:none;
      animation: slideIn 0.5s ease both;
    }
    #outputWrap.visible { display:block; }

    .output-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .output-title {
      font-family:'Bebas Neue', sans-serif;
      font-size:16px; letter-spacing:0.08em; color:var(--orange);
    }
    .copy-btn {
      background:var(--surface2); border:1px solid var(--border);
      color:var(--muted2); border-radius:4px;
      padding:4px 10px; font-size:10px;
      font-family:'Barlow Condensed', sans-serif;
      font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; transition:all 0.2s;
    }
    .copy-btn:hover { border-color:var(--orange); color:var(--orange); }

    /* Schedule grid rendered from Claude */
    #scheduleOutput {
      background:var(--bg);
      border:1px solid var(--border);
      border-radius:6px;
      padding:12px;
      font-size:11px;
      line-height:1.7;
      color:var(--text);
      max-height:480px;
      overflow-y:auto;
      white-space:pre-wrap;
      font-family:'Barlow', sans-serif;
      scrollbar-width:thin;
      scrollbar-color: var(--border) transparent;
    }
    #scheduleOutput::-webkit-scrollbar { width:4px; }
    #scheduleOutput::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* Formatted schedule elements injected by JS */
    #scheduleOutput .week-header {
      font-family:'Barlow Condensed', sans-serif;
      font-weight:700; font-size:12px; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--orange);
      margin:14px 0 6px; padding-bottom:4px;
      border-bottom:1px solid var(--border);
    }
    #scheduleOutput .day-row {
      display:grid;
      grid-template-columns:80px 1fr;
      gap:8px; padding:3px 0;
      border-bottom:1px solid rgba(255,255,255,0.03);
    }
    #scheduleOutput .day-name {
      font-weight:600; color:var(--muted2); font-size:11px;
    }
    #scheduleOutput .day-name.weekend { color:var(--yellow); }
    #scheduleOutput .shifts-cell { font-size:11px; color:var(--text); }
    #scheduleOutput .shift-tag {
      display:inline-block; border-radius:3px;
      padding:1px 6px; margin:1px 3px 1px 0;
      font-size:10px; font-weight:600;
      font-family:'Barlow Condensed', sans-serif; letter-spacing:0.05em;
    }
    #scheduleOutput .shift-morning  { background:rgba(255,214,10,0.15);  color:var(--yellow); }
    #scheduleOutput .shift-afternoon{ background:rgba(255,107,43,0.15);  color:var(--orange); }
    #scheduleOutput .shift-evening  { background:rgba(57,211,83,0.12);   color:var(--green);  }
    #scheduleOutput .shift-off      { background:rgba(100,100,100,0.12); color:var(--muted2); }
    #scheduleOutput .summary-block  {
      background:var(--surface); border:1px solid var(--border);
      border-radius:4px; padding:10px 12px; margin-top:14px;
      font-size:11px; line-height:1.8; color:var(--muted2);
    }
    #scheduleOutput .summary-block strong { color:var(--text); }

    /* Status bar */
    #statusBar {
      display:flex; align-items:center; gap:6px;
      font-size:10px; color:var(--muted);
      font-family:'Barlow Condensed', sans-serif;
      letter-spacing:0.08em; text-transform:uppercase;
      margin-bottom:10px; min-height:18px;
      animation: slideIn 0.4s 0.35s ease both; opacity:0;
    }
    .status-dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--green); flex-shrink:0;
    }
    #statusBar.generating .status-dot { background:var(--orange); animation:pulse 0.8s infinite; }
    #statusBar.error      .status-dot { background:var(--red); }

    @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin    { to{transform:rotate(360deg)} }
    @keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:0.2} }
  </style>
</head>
<body>
<div class="pane">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-icon">&#128197;</div>
      <div>
        <div class="header-title">SHIFT SCHEDULER AI</div>
        <div class="header-sub">Retail &amp; Restaurant &mdash; Powered by Claude</div>
      </div>
    </div>
  </div>

  <!-- API Key -->
  <div class="api-section">
    <div class="api-label"><span class="dot"></span>Anthropic API Key</div>
    <input type="password" id="apiKey" class="api-input" placeholder="sk-ant-api03-..."/>
    <div class="api-hint">Get your key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> &mdash; stored in this session only</div>
  </div>

  <!-- Month & Store -->
  <div class="section">
    <div class="sec-title">Schedule Details</div>
    <div class="row2" style="margin-bottom:8px">
      <div>
        <label>Month</label>
        <input type="month" id="schedMonth"/>
      </div>
      <div>
        <label>Location / Store</label>
        <input type="text" id="storeName" placeholder="e.g. Downtown Cafe"/>
      </div>
    </div>
    <div class="row3">
      <div>
        <label>Open Days</label>
        <select id="openDays">
          <option value="Mon-Sun">Mon &ndash; Sun</option>
          <option value="Mon-Sat">Mon &ndash; Sat</option>
          <option value="Mon-Fri">Mon &ndash; Fri</option>
          <option value="custom">Custom</option>
        </select>
      </div>
      <div>
        <label>Opening Time</label>
        <input type="text" id="openTime" placeholder="e.g. 8:00 AM"/>
      </div>
      <div>
        <label>Closing Time</label>
        <input type="text" id="closeTime" placeholder="e.g. 10:00 PM"/>
      </div>
    </div>
  </div>

  <!-- Shift Types -->
  <div class="section">
    <div class="sec-title">Shift Types</div>
    <div class="shift-toggles">
      <div class="shift-toggle active" data-shift="Morning (Open)" onclick="toggleShift(this)">&#9728; Morning</div>
      <div class="shift-toggle active" data-shift="Afternoon (Mid)" onclick="toggleShift(this)">&#9788; Afternoon</div>
      <div class="shift-toggle active" data-shift="Evening (Close)" onclick="toggleShift(this)">&#9790; Evening</div>
      <div class="shift-toggle"       data-shift="Double Shift"    onclick="toggleShift(this)">&#9889; Double</div>
      <div class="shift-toggle"       data-shift="On-Call"         onclick="toggleShift(this)">&#128222; On-Call</div>
    </div>
  </div>

  <!-- Employees -->
  <div class="section">
    <div class="sec-title">Employees</div>
    <div id="employeeList"></div>
    <button class="add-btn" onclick="addEmployee()">&#43; Add Employee</button>
  </div>

  <!-- Rules & Notes -->
  <div class="section">
    <div class="sec-title">Rules &amp; Notes for Claude</div>
    <textarea id="schedRules" rows="4" placeholder="e.g. No one works more than 5 days in a row. Alice can't work Sundays. We need at least 3 staff on weekends. Bob is a manager and must open or close every day."></textarea>
  </div>

  <!-- Status -->
  <div id="statusBar">
    <div class="status-dot"></div>
    <span id="statusText">Ready</span>
  </div>

  <!-- Generate -->
  <button class="gen-btn" id="genBtn" onclick="generateSchedule()">
    <div class="spinner"></div>
    <span class="btn-text">&#9889;&nbsp; Generate Schedule</span>
  </button>

  <!-- Output -->
  <div id="outputWrap">
    <div class="output-header">
      <div class="output-title">&#128197; Generated Schedule</div>
      <button class="copy-btn" onclick="copySchedule()">&#128203; Copy</button>
    </div>
    <div id="scheduleOutput"></div>
  </div>

</div><!-- .pane -->

<script type="text/javascript">

/* ── Init ── */
var employees = [];
var activeShifts = [];

// Set default month to current
(function() {
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('schedMonth').value = y + '-' + m;
})();

// Collect initially active shifts
document.querySelectorAll('.shift-toggle.active').forEach(function(el) {
  activeShifts.push(el.getAttribute('data-shift'));
});

// Add 3 default employees
addEmployee('Alice', 'Manager');
addEmployee('Bob',   'Server');
addEmployee('Carol', 'Cashier');

Office.onReady(function(){}).catch(function(){});

/* ── Employees ── */
function addEmployee(name, role) {
  var id = Date.now() + Math.random();
  employees.push({ id: id, name: name || '', role: role || '' });
  renderEmployees();
}

function removeEmployee(id) {
  employees = employees.filter(function(e){ return e.id !== id; });
  renderEmployees();
}

function renderEmployees() {
  var list = document.getElementById('employeeList');
  list.innerHTML = '';
  employees.forEach(function(emp) {
    var row = document.createElement('div');
    row.className = 'emp-row';
    row.innerHTML =
      '<input type="text" placeholder="Name" value="' + escHtml(emp.name) + '" oninput="updateEmp(' + emp.id + ',\'name\',this.value)"/>' +
      '<input type="text" placeholder="Role / Position" value="' + escHtml(emp.role) + '" oninput="updateEmp(' + emp.id + ',\'role\',this.value)"/>' +
      '<button class="emp-remove" onclick="removeEmployee(' + emp.id + ')" title="Remove">&#215;</button>';
    list.appendChild(row);
  });
}

function updateEmp(id, field, value) {
  employees.forEach(function(e){ if (e.id === id) e[field] = value; });
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Shift Toggles ── */
function toggleShift(el) {
  el.classList.toggle('active');
  var shift = el.getAttribute('data-shift');
  if (el.classList.contains('active')) {
    activeShifts.push(shift);
  } else {
    activeShifts = activeShifts.filter(function(s){ return s !== shift; });
  }
}

/* ── Status ── */
function setStatus(msg, type) {
  var bar  = document.getElementById('statusBar');
  var text = document.getElementById('statusText');
  if (!bar || !text) return;
  text.textContent = msg;
  bar.className = type === 'generating' ? 'generating' : type === 'error' ? 'error' : '';
}

/* ── Generate ── */
function generateSchedule() {
  var apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { setStatus('Please enter your Anthropic API key above', 'error'); return; }

  var validEmps = employees.filter(function(e){ return e.name.trim(); });
  if (validEmps.length === 0) { setStatus('Add at least one employee', 'error'); return; }

  var month     = document.getElementById('schedMonth').value;
  var storeName = document.getElementById('storeName').value.trim() || 'Our Store';
  var openDays  = document.getElementById('openDays').value;
  var openTime  = document.getElementById('openTime').value.trim()  || '9:00 AM';
  var closeTime = document.getElementById('closeTime').value.trim() || '9:00 PM';
  var rules     = document.getElementById('schedRules').value.trim();
  var shifts    = activeShifts.join(', ') || 'Morning, Afternoon, Evening';

  // Parse month label
  var monthDate  = month ? new Date(month + '-01') : new Date();
  var monthLabel = monthDate.toLocaleDateString('en-US', { month:'long', year:'numeric' });

  var empList = validEmps.map(function(e){
    return '- ' + e.name.trim() + ' (' + (e.role.trim() || 'Staff') + ')';
  }).join('\n');

  var prompt =
    'You are an expert retail/restaurant schedule manager. Create a detailed monthly work schedule.\n\n' +
    'DETAILS:\n' +
    '- Location: ' + storeName + '\n' +
    '- Month: ' + monthLabel + '\n' +
    '- Open days: ' + openDays + '\n' +
    '- Hours: ' + openTime + ' to ' + closeTime + '\n' +
    '- Available shift types: ' + shifts + '\n\n' +
    'EMPLOYEES:\n' + empList + '\n\n' +
    (rules ? 'RULES & CONSTRAINTS:\n' + rules + '\n\n' : '') +
    'OUTPUT FORMAT — respond ONLY with the schedule, no preamble. Use this exact structure:\n\n' +
    'WEEK 1 — [date range]\n' +
    '[Day, Date]: [Employee]: [Shift] | [Employee]: [Shift] | ...\n' +
    '(repeat for each day of that week)\n\n' +
    'WEEK 2 — [date range]\n' +
    '... and so on for all weeks.\n\n' +
    'After all weeks, add a SUMMARY section listing:\n' +
    '- Total shifts per employee\n' +
    '- Days off per employee\n' +
    '- Any notes or flags\n\n' +
    'Be thorough, fair, and follow all rules strictly. Include every day of the month.';

  // UI: loading
  var btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  setStatus('Claude is building your schedule\u2026', 'generating');
  document.getElementById('outputWrap').classList.remove('visible');
  document.getElementById('scheduleOutput').innerHTML = '';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type':      'application/json',
      'x-api-key':         apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model:      'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages:   [{ role: 'user', content: prompt }]
    })
  })
  .then(function(res) {
    if (!res.ok) {
      return res.json().then(function(e) {
        throw new Error(e.error ? e.error.message : 'API error ' + res.status);
      });
    }
    return res.json();
  })
  .then(function(data) {
    var raw = '';
    if (data.content && data.content.length > 0) {
      data.content.forEach(function(block) {
        if (block.type === 'text') raw += block.text;
      });
    }
    if (!raw) throw new Error('Empty response from Claude');
    renderSchedule(raw, monthLabel, storeName);
    setStatus('Schedule generated \u2014 ' + monthLabel, '');
  })
  .catch(function(err) {
    setStatus('Error: ' + err.message, 'error');
  })
  .finally(function() {
    btn.disabled = false;
    btn.classList.remove('loading');
  });
}

/* ── Render Schedule ── */
function renderSchedule(raw, monthLabel, storeName) {
  var out = document.getElementById('scheduleOutput');
  var wrap = document.getElementById('outputWrap');

  // Build HTML from raw text
  var lines = raw.split('\n');
  var html = '';
  var inSummary = false;
  var summaryLines = [];

  lines.forEach(function(line) {
    var trimmed = line.trim();
    if (!trimmed) { if (!inSummary) html += '\n'; return; }

    // Summary block
    if (/^SUMMARY/i.test(trimmed)) {
      inSummary = true;
      return;
    }
    if (inSummary) { summaryLines.push(trimmed); return; }

    // Week header
    if (/^WEEK\s+\d/i.test(trimmed)) {
      html += '<div class="week-header">' + escHtml(trimmed) + '</div>';
      return;
    }

    // Day row: "Monday, Jan 1: Alice: Morning | Bob: Afternoon"
    var dayMatch = trimmed.match(/^([A-Za-z]+,?\s+[A-Za-z]+\.?\s*\d+)\s*[:\-]\s*(.+)$/);
    if (dayMatch) {
      var dayName = dayMatch[1].trim();
      var shiftsRaw = dayMatch[2];
      var isWeekend = /Sat|Sun/i.test(dayName);
      var dayClass = isWeekend ? 'day-name weekend' : 'day-name';

      var shiftHtml = '';
      var parts = shiftsRaw.split('|');
      parts.forEach(function(part) {
        var p = part.trim();
        if (!p) return;
        // Detect shift type for coloring
        var cls = 'shift-tag ';
        if (/morning|open|AM/i.test(p))     cls += 'shift-morning';
        else if (/afternoon|mid/i.test(p))  cls += 'shift-afternoon';
        else if (/evening|close|PM/i.test(p)) cls += 'shift-evening';
        else if (/off|rest|day off/i.test(p)) cls += 'shift-off';
        else                                  cls += 'shift-afternoon';
        shiftHtml += '<span class="' + cls + '">' + escHtml(p) + '</span>';
      });

      html += '<div class="day-row">' +
        '<div class="' + dayClass + '">' + escHtml(dayName) + '</div>' +
        '<div class="shifts-cell">' + shiftHtml + '</div>' +
        '</div>';
      return;
    }

    // Fallback: plain line
    html += '<div style="padding:2px 0;color:var(--muted2)">' + escHtml(trimmed) + '</div>';
  });

  // Summary
  if (summaryLines.length > 0) {
    html += '<div class="summary-block"><strong>&#128203; Summary</strong><br/>' +
      summaryLines.map(function(l){ return escHtml(l); }).join('<br/>') +
      '</div>';
  }

  out.innerHTML = html;
  wrap.classList.add('visible');

  // Store raw for copy
  wrap._rawText = '=== ' + storeName + ' — Work Schedule: ' + monthLabel + ' ===\n\n' + raw;
  // Scroll to output
  setTimeout(function(){ out.scrollIntoView({ behavior:'smooth', block:'start' }); }, 200);
}

/* ── Copy ── */
function copySchedule() {
  var wrap = document.getElementById('outputWrap');
  var text = wrap._rawText || document.getElementById('scheduleOutput').innerText;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.querySelector('.copy-btn');
      btn.textContent = '&#10003; Copied!';
      setTimeout(function(){ btn.innerHTML = '&#128203; Copy'; }, 2000);
    }).catch(function(){ alert('Copy failed. Please select and copy manually.'); });
  } else {
    alert('Copy not available. Please select and copy manually.');
  }
}
